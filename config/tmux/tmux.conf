# Vim-like tmux defaults.

set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -s extended-keys on
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g detach-on-destroy off
set -g allow-passthrough on

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
setw -g mode-keys vi

# Set prefix key
unbind C-b              # Unbind the default prefix key
set -g prefix C-Space   # Set new prefix key to Ctrl+Space

# Refresh tmux config
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Splits in the current directory.
bind v split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x kill-pane

# Resize panes with the same H/J/K/L bias as the Vim config.
bind -r H resize-pane -L 10
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 10
bind = select-layout tiled
bind -r m resize-pane -Z

# Windows
bind -n 'M-]' select-window -t:+
bind -n 'M-[' select-window -t:-
bind c new-window -c "#{pane_current_path}"

# Panes
bind -n 'M-h' select-pane -L
bind -n 'M-j' select-pane -D
bind -n 'M-k' select-pane -U
bind -n 'M-l' select-pane -R

# Copy mode: vi selection keys, y copies and exits.
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi y send -X copy-selection-and-cancel
if-shell -b 'command -v pbcopy >/dev/null 2>&1' 'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"'
bind P paste-buffer
unbind -T copy-mode-vi MouseDragEnd1Pane

# Minimal status line.
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour250"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour117,bold] #S #[fg=colour245]#I:#P "
set -g status-right "#[fg=colour245]%Y-%m-%d #[fg=colour117]%H:%M "

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour235,bg=colour117,bold] #I:#W "
setw -g window-status-separator ""
setw -g pane-border-style "fg=colour238"
setw -g pane-active-border-style "fg=colour117"
